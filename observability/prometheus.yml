global:
  scrape_interval: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'go-server'
    metrics_path: /metrics
    static_configs:
      - targets: ['go-server:8080']
        labels:
          service: go-server

  - job_name: 'python-agent'
    metrics_path: /metrics
    static_configs:
      - targets: ['python-agent:8000']
        labels:
          service: python-agent

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: otel-collector

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
